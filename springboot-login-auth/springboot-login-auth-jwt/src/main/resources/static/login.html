<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - JWT认证系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 400px;
            padding: 48px 40px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #999;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .form-group input.error {
            border-color: #e74c3c;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.1s;
        }
        .btn-login:hover { opacity: 0.9; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 6px;
            min-height: 18px;
        }
        .demo-hint {
            margin-top: 24px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        .demo-hint strong { color: #333; }
        .demo-hint code {
            background: #e8eaed;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>JWT 认证系统</h1>
            <p>请输入用户名和密码登录</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
                <div class="error-msg" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                <div class="error-msg" id="passwordError"></div>
            </div>

            <div class="error-msg" id="loginError" style="text-align:center;margin-bottom:12px;font-size:14px;"></div>

            <button type="submit" class="btn-login" id="btnLogin">登 录</button>
        </form>

        <div class="demo-hint">
            <strong>演示账号：</strong><br>
            管理员：<code>admin</code> / <code>admin123</code>（ROLE_ADMIN, ROLE_USER）<br>
            普通用户：<code>user</code> / <code>user123</code>（ROLE_USER）
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // 已登录则跳转主页
        Auth.redirectIfAuthenticated();

        async function handleLogin(e) {
            e.preventDefault();

            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const btnLogin = document.getElementById('btnLogin');
            const loginError = document.getElementById('loginError');

            // 清除之前的错误
            loginError.textContent = '';
            usernameInput.classList.remove('error');
            passwordInput.classList.remove('error');

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // 前端校验
            if (!username) {
                usernameInput.classList.add('error');
                document.getElementById('usernameError').textContent = '请输入用户名';
                return;
            }
            if (!password) {
                passwordInput.classList.add('error');
                document.getElementById('passwordError').textContent = '请输入密码';
                return;
            }

            // 禁用按钮
            btnLogin.disabled = true;
            btnLogin.textContent = '登录中...';

            try {
                const result = await Auth.login(username, password);
                if (result.success) {
                    window.location.href = '/index.html';
                } else {
                    loginError.textContent = result.message || '登录失败，请检查用户名和密码';
                }
            } catch (err) {
                loginError.textContent = '网络错误，请稍后重试';
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = '登 录';
            }
        }

        // 输入时清除错误状态
        document.getElementById('username').addEventListener('input', function() {
            this.classList.remove('error');
            document.getElementById('usernameError').textContent = '';
        });
        document.getElementById('password').addEventListener('input', function() {
            this.classList.remove('error');
            document.getElementById('passwordError').textContent = '';
        });
    </script>
</body>
</html>
